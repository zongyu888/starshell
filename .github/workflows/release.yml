name: Build Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Set JDK home (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "JAVA_HOME=$env:JAVA_HOME" >> $env:GITHUB_ENV
          echo "jdk.home=$env:JAVA_HOME" >> $env:GITHUB_ENV

      - name: Set JDK home (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "jdk.home=$JAVA_HOME" >> $GITHUB_ENV

      - name: Build with Maven (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd java-client
          mvn clean package -DskipTests -Pwindows "-Djdk.home=$env:JAVA_HOME"

      - name: Build with Maven (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd java-client
          mvn clean package -DskipTests -Pmac "-Djdk.home=$JAVA_HOME"

      - name: Build with Maven (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd java-client
          mvn clean package -DskipTests -Plinux "-Djdk.home=$JAVA_HOME"

      - name: Check build output
        run: |
          ls -la java-client/target/
          ls -la java-client/target/installer/ || echo "installer directory not found"

      - name: Create distribution (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          if (Test-Path "java-client\target\installer\StarShell") {
            cd java-client\target\installer\StarShell
            Compress-Archive -Path . -DestinationPath "${{ github.workspace }}\StarShell-${{ github.ref_name }}-windows.zip"
          } else {
            Write-Error "Build output not found!"
            exit 1
          }

      - name: Create distribution (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          if [ -d "java-client/target/installer/StarShell" ]; then
            cd java-client/target/installer/StarShell
            zip -r "${{ github.workspace }}/StarShell-${{ github.ref_name }}-macos.zip" .
          else
            echo "Build output not found!"
            exit 1
          fi

      - name: Create distribution (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ -d "java-client/target/installer/StarShell" ]; then
            cd java-client/target/installer/StarShell
            zip -r "${{ github.workspace }}/StarShell-${{ github.ref_name }}-linux.zip" .
          else
            echo "Build output not found!"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarShell-${{ matrix.platform }}
          path: |
            ${{ github.workspace }}/StarShell-*.zip
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: find artifacts -type f -name "*.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/StarShell-windows/StarShell-*.zip
            artifacts/StarShell-macos/StarShell-*.zip
            artifacts/StarShell-linux/StarShell-*.zip
          body: |
            ## 🚀 StarShell ${{ github.ref_name }}

            ### 📥 下载说明

            - **Windows**: 下载 `StarShell-*-windows.zip`，解压后运行 `StarShell.exe`
            - **macOS**: 下载 `StarShell-*-macos.zip`，解压后运行 `StarShell.app`
            - **Linux**: 下载 `StarShell-*-linux.zip`，解压后运行 `./StarShell`

            ### 📝 系统要求

            - 无需安装 Java（内置运行时）
            - 需要网络连接以使用 AI 功能

            ### 💬 反馈

            如有问题，请在 [Issues](https://github.com/zongyu888/starshell/issues) 中反馈。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}