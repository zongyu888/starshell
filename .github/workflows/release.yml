name: Build Release Packages

on:
  push:
    tags:
      - 'v*'  # 当推送 v 开头的 tag 时触发，如 v1.0.0
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            platform: windows
            ext: .exe
          - os: macos-latest
            platform: macos
            ext: .dmg
          - os: ubuntu-latest
            platform: linux
            ext: .deb

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Build with Maven (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd java-client
          mvn clean package -DskipTests -Pwindows

      - name: Build with Maven (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd java-client
          mvn clean package -DskipTests -Pmac

      - name: Build with Maven (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd java-client
          mvn clean package -DskipTests -Plinux

      - name: Create distribution (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd java-client/target/installer/StarShell
          Compress-Archive -Path . -DestinationPath ${{ github.workspace }}/StarShell-${{ github.ref_name }}-windows.zip

      - name: Create distribution (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd java-client/target/installer/StarShell
          zip -r ${{ github.workspace }}/StarShell-${{ github.ref_name }}-macos.zip .

      - name: Create distribution (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd java-client/target/installer/StarShell
          zip -r ${{ github.workspace }}/StarShell-${{ github.ref_name }}-linux.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarShell-${{ matrix.platform }}
          path: |
            ${{ github.workspace }}/StarShell-*.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: StarShell-windows
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: StarShell-macos
          path: artifacts/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: StarShell-linux
          path: artifacts/linux

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows/StarShell-*.zip
            artifacts/macos/StarShell-*.zip
            artifacts/linux/StarShell-*.zip
          body: |
            ## 🚀 StarShell ${{ github.ref_name }}

            ### 📥 下载说明

            - **Windows**: 下载 `StarShell-*-windows.zip`，解压后运行 `StarShell.exe`
            - **macOS**: 下载 `StarShell-*-macos.zip`，解压后运行 `StarShell.app`
            - **Linux**: 下载 `StarShell-*-linux.zip`，解压后运行 `./StarShell`

            ### 📝 更新日志

            - 新功能发布
            - Bug 修复
            - 性能优化

            ### 💬 反馈

            如有问题，请在 [Issues](https://github.com/zongyu888/starshell/issues) 中反馈。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}