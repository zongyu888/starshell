name: Build Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # 允许创建 Release

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # 一个平台失败不影响其他平台
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxtst-dev libxslt1.1 fakeroot rpm
          # jpackage 需要 dpkg-deb 来创建 deb 包
          sudo apt-get install -y dpkg-dev

      - name: Create macOS icon (icns)
        if: matrix.os == 'macos-latest'
        run: |
          cd java-client/src/main/resources/images
          # 创建临时目录存放不同尺寸的图标
          mkdir -p icon.iconset
          # 生成不同尺寸的图标
          sips -z 16 16     icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          # 使用 iconutil 生成 icns 文件
          iconutil -c icns icon.iconset -o icon.icns
          # 清理临时文件
          rm -rf icon.iconset
          ls -la

      - name: Build with Maven (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd java-client
          mvn clean package -DskipTests -Pwindows "-Djdk.home=$env:JAVA_HOME"

      - name: Build with Maven (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd java-client
          mvn clean package -DskipTests -Pmac "-Djdk.home=$JAVA_HOME"

      - name: Build with Maven (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd java-client
          mvn clean package -DskipTests -Plinux "-Djdk.home=$JAVA_HOME"

      - name: Check build output (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          echo "=== Checking target directory ==="
          ls -la java-client/target/ || echo "target directory not found"
          echo "=== Checking installer directory ==="
          ls -la java-client/target/installer/ || echo "installer directory not found"
          echo "=== Checking StarShell directory ==="
          ls -la java-client/target/installer/StarShell/ || echo "StarShell directory not found"

      - name: Check build output (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Write-Host "=== Checking target directory ==="
          Get-ChildItem "java-client\target\" -ErrorAction SilentlyContinue
          Write-Host "=== Checking installer directory ==="
          Get-ChildItem "java-client\target\installer\" -ErrorAction SilentlyContinue
          Write-Host "=== Checking StarShell directory ==="
          Get-ChildItem "java-client\target\installer\StarShell\" -ErrorAction SilentlyContinue

      - name: Create distribution (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          if (Test-Path "java-client\target\installer\StarShell") {
            cd java-client\target\installer\StarShell
            Compress-Archive -Path . -DestinationPath "${{ github.workspace }}\StarShell-${{ github.ref_name }}-windows.zip" -Force
            Write-Host "Windows zip created successfully"
          } else {
            Write-Error "Build output not found!"
            exit 1
          }

      - name: Create distribution (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          echo "=== Checking installer directory ==="
          ls -la java-client/target/installer/ || echo "installer directory not found"
          
          # macOS jpackage 生成 .app 目录
          if [ -d "java-client/target/installer/StarShell.app" ]; then
            echo "Found StarShell.app, creating zip..."
            cd java-client/target/installer
            zip -r "${{ github.workspace }}/StarShell-${{ github.ref_name }}-macos.zip" StarShell.app
            echo "macOS zip created successfully"
          elif [ -d "java-client/target/installer/StarShell" ]; then
            echo "Found StarShell directory, creating zip..."
            cd java-client/target/installer/StarShell
            zip -r "${{ github.workspace }}/StarShell-${{ github.ref_name }}-macos.zip" .
            echo "macOS zip created successfully"
          else
            echo "Build output not found! Checking what was created..."
            find java-client/target -name "*.app" -o -name "*.dmg" -o -name "*.pkg" 2>/dev/null
            exit 1
          fi

      - name: Create distribution (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ -d "java-client/target/installer/StarShell" ]; then
            cd java-client/target/installer/StarShell
            zip -r "${{ github.workspace }}/StarShell-${{ github.ref_name }}-linux.zip" .
            echo "Linux zip created successfully"
          else
            echo "Build output not found! Checking what was created..."
            find java-client/target -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" 2>/dev/null
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarShell-${{ matrix.platform }}
          path: |
            ${{ github.workspace }}/StarShell-*.zip
          retention-days: 1
        if: always()  # 即使构建失败也上传日志

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: |
          echo "=== All downloaded files ==="
          find artifacts -type f
          echo "=== Zip files ==="
          find artifacts -type f -name "*.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/StarShell-windows/StarShell-*.zip
            artifacts/StarShell-macos/StarShell-*.zip
            artifacts/StarShell-linux/StarShell-*.zip
          body: |
            ## 🚀 StarShell ${{ github.ref_name }}

            ### 📥 下载说明

            - **Windows**: 下载 `StarShell-*-windows.zip`，解压后运行 `StarShell.exe`
            - **macOS**: 下载 `StarShell-*-macos.zip`，解压后运行 `StarShell.app`
            - **Linux**: 下载 `StarShell-*-linux.zip`，解压后运行 `./StarShell`

            ### 📝 系统要求

            - 无需安装 Java（内置运行时）
            - 需要网络连接以使用 AI 功能

            ### 💬 反馈

            如有问题，请在 [Issues](https://github.com/zongyu888/starshell/issues) 中反馈。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}